apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.vaultServiceAccount | quote }}
  namespace: {{ .Release.Namespace | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-k8s-auth-secret
  namespace: {{ .Release.Namespace | quote }}
  annotations:
    kubernetes.io/service-account.name: {{ .Values.rbac.vaultServiceAccount | quote }}
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: role-tokenreview-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: {{ .Values.rbac.vaultServiceAccount | quote }}
  namespace: {{ .Release.Namespace | quote }}
